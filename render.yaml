databases:
  - name: salary-management-db
    plan: free
    databaseName: salary_management_production

services:
  - type: web
    name: salary-management
    runtime: ruby
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: salary-management-db
          property: connectionString
